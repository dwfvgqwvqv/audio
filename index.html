<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>极简 · 黑白 音乐播放器（无需 songs.json）</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --bg:#0b0b0b; --card:#0f0f0f; --muted:#a8a8a8; --accent:#fff;
  --glass:rgba(255,255,255,0.04); --radius:12px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:Inter,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,var(--bg),#050505); color:var(--accent);
  display:flex; align-items:center; justify-content:center; padding:28px;
}
.wrap{width:min(980px,96%); display:flex; gap:24px; flex-wrap:wrap}
.card{
  background:linear-gradient(180deg,var(--card),#0b0b0b);
  border-radius:var(--radius); padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.6);
}
.player{width:640px;max-width:100%;display:flex;gap:14px;align-items:flex-start}
.visual{
  width:120px;height:120px;border-radius:10px;
  background:linear-gradient(135deg,#111,#1a1a1a);
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
}
.visual .note{font-size:36px;color:var(--muted)}
.info{flex:1;display:flex;flex-direction:column;gap:10px}
.title{font-size:18px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.subtitle{font-size:13px;color:var(--muted)}
.controls{display:flex;align-items:center;gap:10px}
.btn{
  display:inline-grid;place-items:center;width:48px;height:48px;
  border-radius:10px;background:transparent;border:1px solid rgba(255,255,255,.04);
  cursor:pointer;color:var(--accent);font-size:16px
}
.progress-wrap{
  height:8px;background:rgba(255,255,255,.03);border-radius:8px;overflow:hidden;
  cursor:pointer;margin-top:6px
}
.progress{height:100%;width:0;background:linear-gradient(90deg,#fff,#dcdcdc)}
.meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-top:8px}
.list{width:300px;max-height:420px;overflow:auto;padding:10px}
.song{
  padding:10px 12px;border-radius:8px;margin-bottom:8px;cursor:pointer;
  color:var(--muted);display:flex;justify-content:space-between;align-items:center
}
.song:hover{background:var(--glass)}
.song.active{
  background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
  color:var(--accent);font-weight:600
}
.small{font-size:12px;color:var(--muted)}
@media (max-width:720px){
  .wrap{flex-direction:column}
  .list{width:100%}
  .player{width:100%}
}

/* 呼吸动画（可删除） */
@keyframes pulse{
  0%   {transform:scale(1);}
  50%  {transform:scale(1.04);}
  100% {transform:scale(1);}
}
.pulse{animation:pulse 1.6s infinite ease-in-out}
</style>
</head>
<body>
<main class="wrap">
  <!-- 播放器 -->
  <section class="card player" aria-label="音乐播放器">
    <div class="visual" id="visual"><div class="note">♪</div></div>

    <div class="info">
      <div>
        <div id="title" class="title">未选择</div>
        <div id="subtitle" class="subtitle"></div>
      </div>

      <!-- video 兼容音频/视频，隐藏 -->
      <video id="media" preload="metadata" style="display:none"></video>

      <div class="controls">
        <button id="prev" class="btn" title="上一首">⟲</button>
        <button id="play" class="btn" title="播放 / 暂停">▶</button>
        <button id="next" class="btn" title="下一首">⟲</button>
        <div style="flex:1"></div>
        <button id="shuffle" class="btn" title="随机">🔀</button>
      </div>

      <div class="progress-wrap" id="progressWrap"><div id="progress" class="progress"></div></div>

      <div class="meta">
        <div id="time" class="small">0:00 / 0:00</div>
        <div class="small">文件：<span id="count">0</span></div>
      </div>
    </div>
  </section>

  <!-- 播放列表 -->
  <aside class="card list" id="listCard" aria-label="播放列表">
    <div id="listInner" class="small"></div>
  </aside>
</main>

<script>
/* ---------- 歌曲列表（手动填写同目录下的文件名） ---------- */
const playlist = [
  "track01.mp3",
  "track02.wav",
  "track03.flac"
].map(name => ({
  name,
  url: './' + encodeURIComponent(name)   // 防止空格或中文被误解
}));

/* ---------- 常量 & DOM ---------- */
const SUPPORTED = ['.mp3','.mp4','.wav','.ogg','.m4a','.flac','.aac'];
const media        = document.getElementById('media');
const playBtn      = document.getElementById('play');
const prevBtn      = document.getElementById('prev');
const nextBtn      = document.getElementById('next');
const shuffleBtn   = document.getElementById('shuffle');
const listInner    = document.getElementById('listInner');
const titleEl      = document.getElementById('title');
const subtitleEl   = document.getElementById('subtitle');
const progress     = document.getElementById('progress');
const progressWrap = document.getElementById('progressWrap');
const countEl      = document.getElementById('count');
const timeEl       = document.getElementById('time');

/* ---------- 状态 ---------- */
let idx = 0;
let isPlaying = false;
let shuffled = false;

/* ---------- 工具 ---------- */
function fmt(sec){
  if(!isFinite(sec)) return '0:00';
  sec = Math.floor(sec);
  const m = Math.floor(sec/60);
  const s = String(sec%60).padStart(2,'0');
  return `${m}:${s}`;
}

/* ---------- UI 渲染 ---------- */
function renderList(){
  listInner.innerHTML = '';
  playlist.forEach((t,i)=>{
    const el = document.createElement('div');
    el.className = 'song' + (i===idx ? ' active' : '');
    el.textContent = t.name;
    el.addEventListener('click',()=>{ idx=i; loadTrack(i); play(); });
    listInner.appendChild(el);
  });
  countEl.textContent = playlist.length;
  subtitleEl.textContent = `${playlist.length} 首（写在代码里）`;
}

/* ---------- 加载/播放 ---------- */
function loadTrack(i){
  if(i<0 || i>=playlist.length) return;
  idx = i;
  const t = playlist[i];
  media.src = t.url;
  media.load();
  titleEl.textContent = t.name;
  document.querySelectorAll('.song')
          .forEach((el,ii)=>el.classList.toggle('active', ii===i));
}
function attemptPlay(){
  if(!media.src) return;
  media.play()
    .then(()=>{
      isPlaying = true;
      playBtn.textContent = '⏸';
      document.getElementById('visual').classList.add('pulse');
    })
    .catch(err=>{
      console.error('play failed', err);
      playBtn.textContent = '▶';
      alert('播放被阻止或文件不受支持（查看 console）');
    });
}
function play(){ attemptPlay(); }
function pause(){
  media.pause();
  isPlaying = false;
  playBtn.textContent = '▶';
  document.getElementById('visual').classList.remove('pulse');
}
function next(){
  if(!playlist.length) return;
  idx = shuffled ? Math.floor(Math.random()*playlist.length) : (idx+1)%playlist.length;
  loadTrack(idx);
  attemptPlay();
}
function prev(){
  if(!playlist.length) return;
  idx = shuffled ? Math.floor(Math.random()*playlist.length) : (idx-1+playlist.length)%playlist.length;
  loadTrack(idx);
  attemptPlay();
}
shuffleBtn.addEventListener('click',()=>{
  shuffled = !shuffled;
  shuffleBtn.style.borderColor = shuffled ? 'rgba(255,255,255,.12)' : 'rgba(255,255,255,.04)';
});

/* ---------- UI 交互 ---------- */
playBtn.addEventListener('click',()=> isPlaying ? pause() : play());
nextBtn.addEventListener('click',next);
prevBtn.addEventListener('click',prev);

media.addEventListener('timeupdate',()=>{
  if(!media.duration) return;
  const pct = (media.currentTime/media.duration)*100;
  progress.style.width = pct + '%';
  timeEl.textContent = `${fmt(media.currentTime)} / ${fmt(media.duration)}`;
});
media.addEventListener('ended',next);

progressWrap.addEventListener('click',e=>{
  const rect = progressWrap.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const pct = clickX / rect.width;
  if(media.duration) media.currentTime = pct * media.duration;
});

/* ---------- 初始化 ---------- */
if(playlist.length===0){
  listInner.innerHTML = '<div class="small">(未在代码中定义任何可播放的文件)</div>';
  subtitleEl.textContent = '';
}else{
  renderList();
  loadTrack(0);
}
</script>
</body>
</html>
