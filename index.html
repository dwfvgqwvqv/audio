<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>极简 · 黑白 音乐播放器</title>
<style>
  :root{
    --bg:#0b0b0b;
    --card:#0f0f0f;
    --muted:#a8a8a8;
    --accent:#ffffff;
    --glass: rgba(255,255,255,0.04);
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(180deg,var(--bg),#050505);
    color:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:28px;
    -webkit-font-smoothing:antialiased;
  }

  /* 容器 */
  .wrap{
    width:min(980px,96%);
    display:flex;
    gap:24px;
    align-items:flex-start;
    justify-content:center;
    flex-wrap:wrap;
  }

  /* 卡片 */
  .card{
    background:linear-gradient(180deg,var(--card),#0b0b0b);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
  }

  /* 播放器主体 */
  .player{
    width:640px;
    max-width:100%;
    display:flex;
    gap:14px;
    align-items:flex-start;
    padding:18px;
    border-radius:10px;
    background: linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
  }

  .visual{
    width:120px;
    height:120px;
    border-radius:10px;
    background:linear-gradient(135deg,#111,#1a1a1a);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    position:relative;
    overflow:hidden;
  }
  .visual .note{
    font-size:36px;
    color:var(--muted);
    opacity:0.9;
  }

  .info{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .title{
    font-size:18px;
    font-weight:600;
    color:var(--accent);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .subtitle{
    font-size:13px;
    color:var(--muted);
  }

  /* 控件 */
  .controls{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .btn{
    display:inline-grid;
    place-items:center;
    width:48px;
    height:48px;
    border-radius:10px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.04);
    color:var(--accent);
    cursor:pointer;
    font-size:16px;
  }
  .btn:active{transform:translateY(1px)}
  .btn.icon{width:44px;height:44px}

  .progress-wrap{
    height:8px;
    background:rgba(255,255,255,0.03);
    border-radius:8px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
    margin-top:6px;
  }
  .progress{
    height:100%;
    width:0%;
    background: linear-gradient(90deg,#fff,#dcdcdc);
    transition: width 0.12s linear;
  }

  .meta{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    color:var(--muted);
    margin-top:8px;
  }

  /* 列表侧边 */
  .list {
    width:300px;
    max-width:100%;
    max-height:420px;
    overflow:auto;
    padding:10px;
    background:transparent;
  }
  .song{
    padding:10px 12px;
    border-radius:8px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    gap:12px;
    cursor:pointer;
    color:var(--muted);
    align-items:center;
  }
  .song:hover{background:var(--glass)}
  .song.active{
    background: linear-gradient(90deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    color:var(--accent);
    font-weight:600;
  }
  .song .name{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .small{font-size:12px;color:var(--muted)}

  /* 下面的工具条：导出 / 提示 */
  .tools{
    display:flex;
    gap:8px;
    margin-top:12px;
    align-items:center;
    flex-wrap:wrap;
  }
  .ghost{
    background:transparent;
    border:1px dashed rgba(255,255,255,0.04);
    color:var(--muted);
    padding:8px 10px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
  }

  /* 细节：响应式 */
  @media (max-width:880px){
    .player{flex-direction:row; gap:12px}
    .wrap{flex-direction:column; align-items:stretch}
    .list{order:2}
  }
  @media (max-width:560px){
    .player{flex-direction:column; align-items:stretch}
    .visual{width:100%;height:140px}
  }

  /* 小动画 */
  .pulse{
    animation: pulse 1s linear infinite;
  }
  @keyframes pulse{
    0%{ transform: scale(1) }
    50%{ transform: scale(1.02) }
    100%{ transform: scale(1) }
  }
</style>
</head>
<body>
<main class="wrap">
  <section class="card player" aria-label="音乐播放器">
    <div class="visual" id="visual" title="音乐封面/占位">
      <div class="note">♪</div>
    </div>

    <div class="info" style="min-width:0">
      <div>
        <div id="title" class="title">未选择</div>
        <div id="subtitle" class="subtitle">将在同目录的 songs.json 中读取歌曲列表并播放（请参见右侧示例）。</div>
      </div>

      <audio id="audio" preload="metadata"></audio>

      <div class="controls" style="margin-top:8px">
        <button id="prev" class="btn" title="上一首" aria-label="上一首">⟲</button>
        <button id="play" class="btn icon" title="播放 / 暂停" aria-label="播放或暂停">▶</button>
        <button id="next" class="btn" title="下一首" aria-label="下一首">⟳</button>

        <div style="flex:1"></div>

        <button id="shuffle" class="btn ghost" title="随机" aria-label="随机播放">随机</button>
        <button id="export" class="btn ghost" title="导出 songs.json" aria-label="导出">导出</button>
      </div>

      <div class="progress-wrap" id="progressWrap" aria-hidden="false" style="margin-top:10px">
        <div id="progress" class="progress"></div>
      </div>

      <div class="meta">
        <div id="time" class="small">0:00 / 0:00</div>
        <div class="small">文件：<span id="count">0</span></div>
      </div>

      <div class="tools">
        <div class="small" style="color:var(--muted)">仅支持同目录下由 songs.json 指定的文件；不允许上传或拖放。</div>
      </div>
    </div>
  </section>

  <aside class="list card" id="listCard" aria-label="播放列表">
    <div id="listInner" style="min-width:0"></div>
  </aside>
</main>

<script>
/*
 Single-file minimal, elegant, static-friendly music player (updated).
 Behavior:
  - 仅从 ./songs.json 加载文件名数组（["a.mp3","b.ogg"]）。
  - 使用同目录下的文件 URL = './' + encodeURIComponent(name)。
  - 不支持本地上传、拖放或手动粘贴（已移除）。
  - 支持播放/暂停、上一/下一、随机、进度条、导出 songs.json。
*/

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const shuffleBtn = document.getElementById('shuffle');
const exportBtn = document.getElementById('export');
const listInner = document.getElementById('listInner');
const titleEl = document.getElementById('title');
const subtitleEl = document.getElementById('subtitle');
const progress = document.getElementById('progress');
const progressWrap = document.getElementById('progressWrap');
const countEl = document.getElementById('count');
const timeEl = document.getElementById('time');

let playlist = []; // {name, url}
let idx = -1;
let isPlaying = false;
let shuffled = false;

// Utils
function fmt(sec){
  if(!isFinite(sec)) return '0:00';
  sec = Math.floor(sec);
  const m = Math.floor(sec/60);
  const s = String(sec%60).padStart(2,'0');
  return m + ':' + s;
}
function setTitle(name){
  titleEl.textContent = name || '未选择';
}

// Load songs.json if present
async function tryLoadManifest(){
  try{
    const res = await fetch('./songs.json', {cache:'no-store'});
    if(!res.ok) throw new Error('no manifest');
    const data = await res.json();
    if(!Array.isArray(data)) throw new Error('invalid manifest');
    playlist = data.map(n => ({ name: n, url: './' + encodeURIComponent(n) }));
    if(playlist.length === 0) throw new Error('empty');
    initPlaylist();
    return true;
  }catch(e){
    // no manifest => show instructions
    setTitle('');
    renderEmptyNotice();
    return false;
  }
}

function renderEmptyNotice(){
  listInner.innerHTML = '<div class="small" style="padding:10px;color:var(--muted)">未找到 songs.json。请在与本文件相同的目录创建 songs.json（示例在下），并将音频文件放在同一目录。启用 GitHub Pages 后即可播放。</div>';
  addExample();
}

// Initialize after playlist assigned
function initPlaylist(){
  idx = 0;
  renderList();
  loadTrack(idx);
  countEl.textContent = playlist.length;
  subtitleEl.textContent = playlist.length + ' 首（来自 songs.json）';
}

// Render list UI
function renderList(){
  listInner.innerHTML = '';
  playlist.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'song' + (i===idx ? ' active' : '');
    el.title = s.name;
    const left = document.createElement('div');
    left.style.display = 'flex';
    left.style.alignItems = 'center';
    left.style.gap = '8px';
    const dot = document.createElement('div');
    dot.style.width = '10px';
    dot.style.height = '10px';
    dot.style.borderRadius = '50%';
    dot.style.background = i===idx ? 'linear-gradient(90deg,#fff,#ddd)' : 'transparent';
    dot.style.border = '1px solid rgba(255,255,255,0.03)';
    dot.style.flex = 'none';
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = s.name;
    left.appendChild(dot);
    left.appendChild(name);
    const right = document.createElement('div');
    right.className = 'small';
    right.textContent = '';
    el.appendChild(left);
    el.appendChild(right);

    el.addEventListener('click', ()=>{
      idx = i;
      loadTrack(idx);
      play();
    });
    listInner.appendChild(el);
  });
  countEl.textContent = playlist.length;
}

// Load a track by index
function loadTrack(i){
  if(i < 0 || i >= playlist.length) return;
  const s = playlist[i];
  audio.src = s.url;
  setTitle(s.name);
  document.querySelectorAll('.song').forEach((el,ii)=> el.classList.toggle('active', ii===i));
  try{ audio.load(); }catch(e){}
}

// Play / Pause
function play(){
  if(!audio.src) return;
  audio.play().catch(()=>{ /* 受浏览器策略限制可能需要用户交互 */ });
  isPlaying = true;
  playBtn.textContent = '⏸';
  document.getElementById('visual').classList.add('pulse');
}
function pause(){
  audio.pause();
  isPlaying = false;
  playBtn.textContent = '▶';
  document.getElementById('visual').classList.remove('pulse');
}

// Prev/Next
function next(){
  if(playlist.length===0) return;
  if(shuffled){
    const i = Math.floor(Math.random()*playlist.length);
    idx = i;
  }else{
    idx = (idx+1) % playlist.length;
  }
  loadTrack(idx);
  play();
}
function prev(){
  if(playlist.length===0) return;
  if(shuffled){
    const i = Math.floor(Math.random()*playlist.length);
    idx = i;
  }else{
    idx = (idx-1 + playlist.length) % playlist.length;
  }
  loadTrack(idx);
  play();
}

// Events
playBtn.addEventListener('click', ()=> isPlaying ? pause() : play());
nextBtn.addEventListener('click', next);
prevBtn.addEventListener('click', prev);
shuffleBtn.addEventListener('click', ()=>{
  shuffled = !shuffled;
  shuffleBtn.style.borderColor = shuffled ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)';
  shuffleBtn.style.color = shuffled ? 'var(--accent)' : 'var(--muted)';
});

audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progress.style.width = pct + '%';
  timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
});
audio.addEventListener('ended', ()=>{
  next();
});
progressWrap.addEventListener('click', (e)=>{
  const rect = progressWrap.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = x / rect.width;
  if(audio.duration) audio.currentTime = pct * audio.duration;
});

// Keyboard: 空格播放/暂停
window.addEventListener('keydown', (e)=>{
  if(e.code === 'Space' && document.activeElement.tagName !== 'TEXTAREA'){
    e.preventDefault();
    isPlaying ? pause() : play();
  }
});

// Export current playlist as songs.json (for committing to repo)
exportBtn.addEventListener('click', ()=>{
  if(playlist.length === 0) return;
  const names = playlist.map(s => s.name);
  const blob = new Blob([JSON.stringify(names, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'songs.json';
  a.click();
  URL.revokeObjectURL(a.href);
});

// Try load manifest on start
tryLoadManifest();

// Helper: show example JSON when no manifest
function addExample(){
  const example = document.createElement('pre');
  example.style.background = '#070707';
  example.style.color = 'var(--muted)';
  example.style.padding = '8px';
  example.style.borderRadius = '8px';
  example.style.fontSize = '12px';
  example.style.marginTop = '8px';
  example.textContent = JSON.stringify(["a.mp3","b.ogg"], null, 2);
  listInner.appendChild(example);
}
</script>
</body>
</html>
