<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Noir Essence v8.0 - Studio Signature</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root {
  --bg-base: #050506;
  --panel-bg: rgba(18, 18, 20, 0.85);
  --accent-white: #ffffff;
  --text-dim: #555558;
  --glow: rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

/* 甲方要求的：质感背景 - 增加噪声和流动光影 */
body {
  margin: 0; font-family: "Inter", sans-serif;
  background-color: var(--bg-base);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3仿真噪声%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
}

/* 动态深海光晕 */
body::before {
  content: ""; position: absolute; width: 140%; height: 140%;
  background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03) 0%, transparent 50%);
  animation: drift 20s infinite alternate linear; z-index: -1;
}

@keyframes drift {
  from { transform: translate(-10%, -10%); }
  to { transform: translate(10%, 10%); }
}

/* 播放器主体：精密仪器感 */
.player-wrap {
  width: 400px; padding: 40px; border-radius: 48px;
  background: var(--panel-bg);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
  position: relative;
}

/* 状态指示器 */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
  margin-bottom: 30px; text-transform: uppercase;
}

.decode-anim::after {
  content: "..."; animation: dots 1.5s steps(4, end) infinite;
}
@keyframes dots { 0%, 20% { content: "."; } 40% { content: ".."; } 60% { content: "..."; } 80%, 100% { content: ""; } }

/* 专业级电平表 */
.visualizer {
  display: flex; justify-content: center; align-items: flex-end;
  gap: 4px; height: 40px; margin-bottom: 30px;
}
.v-bar {
  width: 2px; background: var(--accent-white); border-radius: 1px;
  height: 4px; opacity: 0.1; transition: 0.2s;
}
.playing .v-bar { animation: analyzer 0.6s infinite ease-in-out; opacity: 0.6; }
/* 随机化高度 */
.v-bar:nth-child(odd) { animation-duration: 0.8s; }
.v-bar:nth-child(3n) { animation-duration: 0.5s; }

@keyframes analyzer {
  0%, 100% { height: 4px; }
  50% { height: 35px; }
}

.info-zone { text-align: center; margin-bottom: 35px; }
.title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
.artist { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

/* 进度条：增加点击热区和发光效果 */
.scrubber { margin-bottom: 30px; cursor: pointer; padding: 15px 0; }
.rail { height: 2px; background: rgba(255,255,255,0.1); position: relative; }
.fill { 
  height: 100%; width: 0%; background: #fff; position: relative;
  box-shadow: 0 0 15px rgba(255,255,255,0.3);
}
.fill::after {
  content: ""; position: absolute; right: -4px; top: -4px;
  width: 10px; height: 100px; /* 隐形热区 */
}

/* 控制按钮：增加动效 */
.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.btn { 
  background: none; border: none; color: var(--text-dim); cursor: pointer; transition: 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.btn:hover { color: #fff; transform: scale(1.1); }

.play-main {
  width: 72px; height: 72px; background: #fff; color: #000; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 0 rgba(255,255,255,0.2); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.playing .play-main { box-shadow: 0 0 30px rgba(255,255,255,0.1); }
.play-main:active { transform: scale(0.9); }

/* 列表区：甲方要求的动态反馈 */
.track-list {
  max-height: 140px; overflow-y: auto;
  mask-image: linear-gradient(to bottom, transparent, #000 15%, #000 85%, transparent);
}
.track-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 10px; border-radius: 12px; transition: 0.2s; cursor: pointer;
  margin-bottom: 2px; font-size: 13px; color: var(--text-dim);
}
.track-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
.track-item.active { background: rgba(255,255,255,0.06); color: #fff; }

/* 动态波纹图标 */
.playing-icon {
  display: none; width: 12px; gap: 2px; align-items: flex-end; height: 10px;
}
.active .playing-icon { display: flex; }
.active .playing-icon span {
  width: 2px; background: #fff; animation: wave 0.6s infinite alternate;
}
@keyframes wave { from { height: 2px; } to { height: 10px; } }

/* 自定义滚动条 */
.track-list::-webkit-scrollbar { width: 2px; }
.track-list::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>
<body>

<div class="player-wrap" id="player">
  <audio id="audio"></audio>

  <div class="status-bar">
    <span id="state-text" class="decode-anim">Decoding Logic</span>
    <span>24bit / 192kHz</span>
  </div>

  <!-- 专业频谱 -->
  <div class="visualizer">
    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
    <div class="v-bar"></div><div class="v-bar"></div><div class="v-bar"></div>
  </div>

  <div class="info-zone">
    <div class="title" id="title">Initialize</div>
    <div class="artist" id="artist">Waiting for source</div>
  </div>

  <div class="scrubber" id="scrubber">
    <div class="rail"><div class="fill" id="fill"></div></div>
    <div style="display:flex; justify-content:space-between; font-size:10px; color:var(--text-dim); margin-top:12px; font-family:monospace;">
      <span id="cur">00:00</span>
      <span id="dur">00:00</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn"><i data-lucide="shuffle" size="18"></i></button>
    <button class="btn" id="prev"><i data-lucide="chevrons-left"></i></button>
    <button class="play-main" id="play"><i data-lucide="play" id="playIcon" fill="currentColor"></i></button>
    <button class="btn" id="next"><i data-lucide="chevrons-right"></i></button>
    <button class="btn"><i data-lucide="volume-2" size="18"></i></button>
  </div>

  <div class="track-list" id="list"></div>
</div>

<script>
lucide.createIcons();

const songs = [
  { name: "Void Walker", file: "Void_Walker.wav", type: "LOSSLESS" },
  { name: "Noir Etude", file: "Noir_Etude.flac", type: "STUDIO" },
  { name: "Obsidian", file: "Obsidian.mp3", type: "MPEG" },
  { name: "Synthetic Life", file: "1.mp3", type: "MASTER" }
];

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const player = document.getElementById('player');
const fill = document.getElementById('fill');
const list = document.getElementById('list');

let currentIdx = 0;

function renderList() {
  list.innerHTML = songs.map((s, i) => `
    <div class="track-item ${i === currentIdx ? 'active' : ''}" onclick="playTrack(${i})">
      <div style="display:flex; align-items:center; gap:10px">
        <div class="playing-icon"><span></span><span style="animation-delay:0.2s"></span><span style="animation-delay:0.4s"></span></div>
        <span>${s.name}</span>
      </div>
      <span style="font-size:8px; letter-spacing:1px; opacity:0.5">${s.type}</span>
    </div>
  `).join('');
}

function playTrack(i) {
  const isNew = currentIdx !== i || !audio.src;
  currentIdx = i;
  if(isNew) {
    audio.src = './' + encodeURIComponent(songs[i].file);
    document.getElementById('title').textContent = songs[i].name;
    document.getElementById('artist').textContent = `Bitstream / ${songs[i].type}`;
  }
  audio.play();
  toggleUI(true);
}

function toggleUI(playing) {
  const icon = document.getElementById('playIcon');
  const stateText = document.getElementById('state-text');
  if(playing) {
    player.classList.add('playing');
    icon.setAttribute('data-lucide', 'pause');
    stateText.textContent = "Processing Audio";
    stateText.classList.remove('decode-anim');
  } else {
    player.classList.remove('playing');
    icon.setAttribute('data-lucide', 'play');
    stateText.textContent = "Signal Standby";
    stateText.classList.add('decode-anim');
  }
  lucide.createIcons();
  renderList();
}

playBtn.onclick = () => {
  if (audio.paused) playTrack(currentIdx);
  else { audio.pause(); toggleUI(false); }
};

document.getElementById('next').onclick = () => playTrack((currentIdx + 1) % songs.length);
document.getElementById('prev').onclick = () => playTrack((currentIdx - 1 + songs.length) % songs.length);

audio.ontimeupdate = () => {
  const p = (audio.currentTime / audio.duration) * 100 || 0;
  fill.style.width = p + '%';
  document.getElementById('cur').textContent = formatTime(audio.currentTime);
  document.getElementById('dur').textContent = formatTime(audio.duration);
};

function formatTime(s) {
  const m = Math.floor(s/60 || 0);
  const sec = Math.floor(s%60 || 0);
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

document.getElementById('scrubber').onclick = (e) => {
  const rect = e.currentTarget.querySelector('.rail').getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
};

// Start
renderList();
document.getElementById('title').textContent = songs[0].name;
</script>
</body>
</html>
