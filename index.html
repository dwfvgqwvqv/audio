<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Noir Essence v7.0 - High Contrast</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root {
  /* 调高对比度的色彩体系 */
  --bg-deep: #020202;         /* 极纯黑背景 */
  --card-surface: #0d0d0f;    /* 播放器表面 - 炭灰色 */
  --text-main: #ffffff;       /* 主文字 - 纯白 */
  --text-muted: #888888;      /* 辅助文字 - 中灰 */
  --accent-white: #ffffff;    /* 强调色 */
  --border-glow: rgba(255, 255, 255, 0.08); /* 边缘倒角反光 */
}

* { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

body {
  margin: 0; font-family: "Inter", -apple-system, system-ui, sans-serif;
  background-color: var(--bg-deep);
  color: var(--text-main);
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
}

/* 播放器主体 */
.player-wrap {
  width: 370px; 
  background: var(--card-surface);
  border-radius: 40px;
  padding: 36px;
  /* 增加外阴影让层次分明，内阴影增加金属感 */
  box-shadow: 0 50px 100px rgba(0,0,0,0.9), 
              inset 0 1px 1px var(--border-glow);
  position: relative;
  border: 1px solid rgba(255,255,255,0.03); /* 极细的外边框 */
}

/* 顶部信息 */
.top-meta {
  display: flex; justify-content: space-between;
  font-size: 10px; font-weight: 700; letter-spacing: 2px;
  color: var(--text-muted); margin-bottom: 30px; text-transform: uppercase;
}

/* 核心视窗：电平脉冲动画 */
.display-unit {
  padding: 10px 0 35px;
  text-align: center;
}
.visual-bars {
  display: flex; justify-content: center; gap: 5px; height: 24px; margin-bottom: 24px; align-items: flex-end;
}
.bar { width: 3px; background: var(--accent-white); border-radius: 1px; height: 4px; opacity: 0.8; }
.playing .bar { animation: pulse 0.7s infinite ease-in-out; }
.bar:nth-child(2) { animation-delay: 0.15s; }
.bar:nth-child(3) { animation-delay: 0.3s; }
@keyframes pulse { 0%, 100% { height: 4px; opacity: 0.3; } 50% { height: 24px; opacity: 1; } }

.title { 
  font-size: 26px; font-weight: 700; margin: 0; letter-spacing: -1px; 
  color: var(--text-main); text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}
.artist { 
  font-size: 14px; color: var(--text-muted); margin-top: 10px; font-weight: 400;
}

/* 进度控制 */
.scrubber { margin: 30px 0; cursor: pointer; padding: 10px 0; }
.rail { height: 4px; background: #1a1a1c; position: relative; border-radius: 2px; }
.fill { height: 100%; width: 0%; background: var(--accent-white); border-radius: 2px; position: relative; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
.fill::after {
  content: ""; position: absolute; right: -7px; top: -5px;
  width: 14px; height: 14px; background: #fff; border-radius: 50%;
  box-shadow: 0 0 15px rgba(255,255,255,0.5); transform: scale(1); /* 常驻滑块提升易用性 */
}

.time-row { 
  display: flex; justify-content: space-between; 
  font-size: 11px; font-weight: 600; color: var(--text-muted); 
  margin-top: 14px; font-family: 'JetBrains Mono', monospace; 
}

/* 交互按钮 */
.control-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 35px; }
.btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  transition: 0.2s; font-size: 12px; font-weight: 800; padding: 12px;
}
.btn:hover { color: var(--text-main); }
.btn-play {
  width: 66px; height: 66px; background: var(--accent-white); color: #000;
  border-radius: 50%; display: grid; place-items: center; font-size: 22px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.4); border: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.btn-play:active { transform: scale(0.92); }

/* 列表区及自定义滚动条 */
.list-area {
  height: 130px; overflow-y: auto; position: relative;
  border-top: 1px solid var(--line); padding-top: 10px;
  mask-image: linear-gradient(to bottom, transparent, #000 10%, #000 90%, transparent);
}
.list-item {
  padding: 14px 10px; font-size: 13px; color: var(--text-muted);
  display: flex; justify-content: space-between; cursor: pointer; border-radius: 12px;
  transition: 0.2s;
}
.list-item:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }
.list-item.active { color: var(--text-main); font-weight: 700; background: rgba(255,255,255,0.05); }

/* 自定义滚动条修正 - 确保可见度 */
.list-area::-webkit-scrollbar { width: 4px; }
.list-area::-webkit-scrollbar-track { background: transparent; }
.list-area::-webkit-scrollbar-thumb { 
  background: rgba(255, 255, 255, 0.2); /* 提高可见度 */
  border-radius: 10px; 
}
.list-area::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

/* 响应式 */
@media (max-width: 400px) { .player-wrap { width: 92vw; padding: 25px; } }
</style>
</head>
<body>

<div class="player-wrap" id="mainContainer">
  <video id="audio" style="display:none"></video>

  <div class="top-meta">
    <span>Reference Mode</span>
    <span id="bitrate">PCM 24-bit</span>
  </div>

  <div class="display-unit">
    <div class="visual-bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <div class="info-block">
      <div class="title" id="title">Standby</div>
      <div class="artist" id="artist">System Online</div>
    </div>
  </div>

  <div class="scrubber" id="scrubber">
    <div class="rail"><div class="fill" id="fill"></div></div>
    <div class="time-row">
      <span id="cur">00:00</span>
      <span id="dur">00:00</span>
    </div>
  </div>

  <div class="control-row">
    <button class="btn" id="shuf">SHUF</button>
    <button class="btn" id="prev">⏮</button>
    <button class="btn-play" id="play">▶</button>
    <button class="btn" id="next">⏭</button>
    <button class="btn" id="loop">LOOP</button>
  </div>

  <div class="list-area" id="list">
    <!-- 动态生成 -->
  </div>
</div>

<script>
const songs = [
  "1.mp3", "Void_Walker.wav", "Noir_Etude.flac", "Obsidian.mp3"
].map(f => ({
  name: f.replace(/\.[^/.]+$/, "").replace(/_/g, " "),
  ext: f.split('.').pop().toUpperCase(),
  url: './' + encodeURIComponent(f)
}));

const audio = document.getElementById('audio');
const playBtn = document.getElementById('play');
const mainContainer = document.getElementById('mainContainer');
const fill = document.getElementById('fill');
const scrubber = document.getElementById('scrubber');
const list = document.getElementById('list');

let currentIdx = 0;

function formatTime(s) {
  if (isNaN(s)) return '00:00';
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function renderList() {
  list.innerHTML = songs.map((s, i) => `
    <div class="list-item ${i === currentIdx ? 'active' : ''}" onclick="playTrack(${i})">
      <span>${s.name}</span>
      <span style="opacity:0.4; font-size:9px; border:1px solid; padding:0 3px; border-radius:2px">${s.ext}</span>
    </div>
  `).join('');
}

function playTrack(i) {
  currentIdx = i;
  audio.src = songs[currentIdx].url;
  document.getElementById('title').textContent = songs[currentIdx].name;
  document.getElementById('artist').textContent = `Mastering / ${songs[currentIdx].ext} Source`;
  audio.play();
  playBtn.textContent = '||';
  mainContainer.classList.add('playing');
  renderList();
}

playBtn.onclick = () => {
  if (audio.paused) {
    audio.play(); playBtn.textContent = '||'; mainContainer.classList.add('playing');
  } else {
    audio.pause(); playBtn.textContent = '▶'; mainContainer.classList.remove('playing');
  }
};

document.getElementById('next').onclick = () => playTrack((currentIdx + 1) % songs.length);
document.getElementById('prev').onclick = () => playTrack((currentIdx - 1 + songs.length) % songs.length);

audio.ontimeupdate = () => {
  const p = (audio.currentTime / audio.duration) * 100 || 0;
  fill.style.width = p + '%';
  document.getElementById('cur').textContent = formatTime(audio.currentTime);
  document.getElementById('dur').textContent = formatTime(audio.duration);
};

audio.onended = () => document.getElementById('next').click();

scrubber.onclick = (e) => {
  const rect = scrubber.querySelector('.rail').getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
};

// Start
renderList();
audio.src = songs[0].url;
document.getElementById('title').textContent = songs[0].name;
</script>
</body>
</html>
