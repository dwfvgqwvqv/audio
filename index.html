<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Hole Audio Visualizer - Smooth Flow Edition</title>
    <style>
        body, html { 
            height: 100%; 
            margin: 0;
            padding: 0;
            background-color: #060608;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ==================== 顶层全局 UI 图层 ==================== */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; 
            pointer-events: none; 
        }

        .audio-control-panel, .centerHover {
            pointer-events: auto; 
        }

        /* ==================== 极简暗夜毛玻璃控制面板 ==================== */
        .audio-control-panel {
            position: absolute;
            top: 30px;
            right: 30px;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 10px 22px;
            background: rgba(10, 10, 14, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px;
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7);
            user-select: none;
            transition: all 400ms ease;
        }

        .audio-control-panel:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(15, 15, 20, 0.85);
        }

        .track-info {
            color: #ddd;
            font-family: serif;
            font-size: 13px;
            letter-spacing: 1px;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            padding-right: 16px;
            max-width: 130px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .audio-btn {
            background: none;
            border: none;
            width: 28px;
            height: 28px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: transform 300ms cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .audio-btn:hover {
            transform: scale(1.2);
        }

        /* 纯 CSS 图标：播放 */
        .icon-play {
            width: 0; height: 0;
            border-style: solid;
            border-width: 6px 0 6px 11px;
            border-color: transparent transparent transparent #bbb;
            margin-left: 2px;
            transition: border-color 300ms;
        }
        .audio-btn:hover .icon-play { border-left-color: #FFF; }

        /* 纯 CSS 图标：暂停 */
        .icon-pause {
            display: none; 
            width: 10px; height: 12px;
            justify-content: space-between;
        }
        .icon-pause::before, .icon-pause::after {
            content: '';
            width: 3px; height: 12px;
            background-color: #bbb;
            transition: background-color 300ms;
        }
        .audio-btn:hover .icon-pause::before, .audio-btn:hover .icon-pause::after { background-color: #FFF; }

        .audio-btn.playing .icon-play { display: none; }
        .audio-btn.playing .icon-pause { display: flex; }

        /* 纯 CSS 图标：下一首 */
        .icon-next { display: flex; align-items: center; }
        .icon-next::before {
            content: ''; width: 0; height: 0;
            border-style: solid; border-width: 5px 0 5px 8px;
            border-color: transparent transparent transparent #bbb;
        }
        .icon-next::after {
            content: ''; width: 2px; height: 10px;
            background-color: #bbb;
        }
        .audio-btn:hover .icon-next::before { border-left-color: #FFF; }
        .audio-btn:hover .icon-next::after { background-color: #FFF; }

        /* 纯 CSS 图标：上一首 */
        .icon-prev { display: flex; align-items: center; }
        .icon-prev::before {
            content: ''; width: 2px; height: 10px;
            background-color: #bbb;
        }
        .icon-prev::after {
            content: ''; width: 0; height: 0;
            border-style: solid; border-width: 5px 8px 5px 0;
            border-color: transparent #bbb transparent transparent;
        }
        .audio-btn:hover .icon-prev::before { background-color: #FFF; }
        .audio-btn:hover .icon-prev::after { border-right-color: #FFF; }

        /* 纯 CSS 图标：模式文字 */
        .icon-mode {
            font-size: 9px;
            font-weight: 600;
            color: #555;
            letter-spacing: 0.5px;
            transition: color 300ms;
        }
        .audio-btn:hover .icon-mode { color: #FFF; }
        .audio-btn.active .icon-mode { 
            color: #ff7675; 
            text-shadow: 0 0 10px rgba(255,118,117,0.6); 
        }

        /* ==================== 核心中心大按钮 ==================== */
        .centerHover {
            width: 255px;
            height: 255px;
            background-color: transparent;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            top: 50%;
            margin-top: -128px;
            margin-left: -128px;
            cursor: pointer;
            line-height: 255px;
            text-align: center;
            transition: all 600ms cubic-bezier(0.16, 1, 0.3, 1);
        }

        .centerHover.open {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.2);
        }

        .centerHover:hover span { color: #FFF; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        .centerHover:hover span:before, .centerHover:hover span:after { background-color: #FFF; width: 24px; }

        .centerHover span {
            color: #666;
            font-family: serif;
            font-size: 18px;
            position: relative;
            transition: all 500ms ease;
            letter-spacing: 3px;
        }

        .centerHover span:before, .centerHover span:after {
            content: '';
            display: inline-block;
            height: 1px;
            width: 16px;
            margin-bottom: 5px;
            background-color: #666;
            transition: all 500ms cubic-bezier(0.16, 1, 0.3, 1);
        }
        .centerHover span:before { margin-right: 14px; }
        .centerHover span:after { margin-left: 14px; }

        /* ==================== 底层动画画布 ==================== */
        #blackhole {
            height: 100%;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div class="audio-control-panel">
            <div class="track-info" id="trackInfo">1.mp3</div>
            <button class="audio-btn" id="btnShuffle" title="随机播放"><span class="icon-mode">RAND</span></button>
            <button class="audio-btn" id="btnPrev" title="上一首"><span class="icon-prev"></span></button>
            <button class="audio-btn" id="btnPlay" title="播放/暂停"><span class="icon-play"></span><span class="icon-pause"></span></button>
            <button class="audio-btn" id="btnNext" title="下一首"><span class="icon-next"></span></button>
            <button class="audio-btn" id="btnLoop" title="单曲循环"><span class="icon-mode">ONE</span></button>
        </div>

        <div class="centerHover"><span>ENTER</span></div>
    </div>

    <div id="blackhole"></div>

    <script>
        // ==================== 音频与真实Web Audio频谱系统 ====================
        const playlist = ['1.mp3', '2.mp3', '3.mp3']; 
        let currentTrackIndex = 0;
        let isShuffle = false;
        let isLoop = false;

        const audio = new Audio();
        audio.src = playlist[currentTrackIndex];
        audio.crossOrigin = "anonymous"; 

        let audioCtx, analyser, source, dataArray;
        let isAudioContextInitialized = false;

        // 三频段解耦量子控制因子
        let audioFactors = {
            bass: 0,
            mid: 0,
            treble: 0
        };

        function initAudioContext() {
            if (isAudioContextInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256; 
                
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);

                source = audioCtx.createMediaElementSource(audio);
                source.connect(analyser);
                analyser.connect(audioCtx.destination);
                
                isAudioContextInitialized = true;
                console.log("Web Audio API 真实频谱流加载成功。");
            } catch(e) {
                console.error("音频流加载异常:", e);
            }
        }

        // 非对称阻尼缓动
        function smoothLerp(current, target, upSpeed = 0.4, downSpeed = 0.08) {
            let diff = target - current;
            return current + diff * (diff > 0 ? upSpeed : downSpeed);
        }

        function updateAnalyserData() {
            if (audio.paused || !isAudioContextInitialized || !dataArray) {
                audioFactors.bass = smoothLerp(audioFactors.bass, 0, 0.08, 0.04);
                audioFactors.mid = smoothLerp(audioFactors.mid, 0, 0.08, 0.04);
                audioFactors.treble = smoothLerp(audioFactors.treble, 0, 0.08, 0.04);
                return;
            }

            analyser.getByteFrequencyData(dataArray);
            
            let len = dataArray.length;
            let bassSum = 0, midSum = 0, trebleSum = 0;

            for (let i = 0; i < len; i++) {
                if (i < len * 0.2) {
                    bassSum += dataArray[i];
                } else if (i < len * 0.7) {
                    midSum += dataArray[i];
                } else {
                    trebleSum += dataArray[i];
                }
            }

            // 物理映射基数
            let targetBass = (bassSum / (len * 0.2 * 255)) * 3.8;
            let targetMid = (midSum / (len * 0.5 * 255)) * 3.0;
            let targetTreble = (trebleSum / (len * 0.3 * 255)) * 2.5;

            audioFactors.bass = smoothLerp(audioFactors.bass, targetBass, 0.45, 0.08);
            audioFactors.mid = smoothLerp(audioFactors.mid, targetMid, 0.35, 0.07);
            audioFactors.treble = smoothLerp(audioFactors.treble, targetTreble, 0.30, 0.06);
        }

        // ==================== 智能天体能量响应黑洞粒子系统 ====================
        function blackhole(element) {
            const container = document.querySelector(element);
            
            let cw = window.innerWidth;
            let ch = window.innerHeight;
            
            const maxorbit = 255; 
            let centery = ch / 2;
            let centerx = cw / 2;

            const stars = [];

            const canvas = document.createElement('canvas');
            const dpr = window.devicePixelRatio || 1;
            canvas.width = cw * dpr;
            canvas.height = ch * dpr;
            container.appendChild(canvas);
            
            const context = canvas.getContext("2d");
            context.scale(dpr, dpr);

            function rotate(cx, cy, x, y, angle) {
                const cos = Math.cos(angle);
                const sin = Math.sin(angle);
                return [
                    (cos * (x - cx)) + (sin * (y - cy)) + cx,
                    (cos * (y - cy)) - (sin * (x - cx)) + cy
                ];
            }

            class Star {
                constructor() {
                    const rands = [Math.random() * (maxorbit / 2) + 1, Math.random() * (maxorbit / 2) + maxorbit];
                    this.orbital = (rands.reduce((p, c) => p + c, 0) / rands.length);
                    
                    this.x = centerx; 
                    this.y = centery + this.orbital; 
                    this.yOrigin = centery + this.orbital; 

                    this.baseSpeed = (Math.floor(Math.random() * 2.0) + 0.6) * Math.PI / 180;
                    this.currentRotation = Math.random() * Math.PI * 2; 

                    this.id = stars.length; 
                    
                    if (this.orbital < maxorbit * 0.35) {
                        this.freqType = 'bass';    
                        this.colorStr = '255, 255, 255'; 
                    } else if (this.orbital < maxorbit * 0.75) {
                        this.freqType = 'mid';     
                        this.colorStr = '235, 240, 255';
                    } else {
                        this.freqType = 'treble';  
                        this.colorStr = '200, 215, 255';
                    }

                    this.prevR = this.currentRotation;
                    this.prevX = this.x;
                    this.prevY = this.y;

                    stars.push(this);
                }

                draw() {
                    // ==================== 【常态：极致的缓缓流淌】 ====================
                    // 大幅调低平时基础速度，粒子没有强音乐时极其安静
                    let dynamicVelocity = this.baseSpeed * 0.15; 
                    let shake = 0;

                    // 1. 常态下的频谱小幅温柔映射
                    if (this.freqType === 'bass') {
                        dynamicVelocity += audioFactors.bass * 0.12; 
                    } else if (this.freqType === 'mid') {
                        dynamicVelocity += audioFactors.mid * 0.10;  
                    } else if (this.freqType === 'treble') {
                        dynamicVelocity += audioFactors.treble * 0.08;
                        shake = (Math.random() - 0.5) * audioFactors.treble * 4.0; 
                    }

                    // ==================== 【核心：速度冲破临界，蓄力变圆】 ====================
                    // 设定动态阈值，只有速度真正被音乐推上去了，才会引发向心坍缩
                    let speedThreshold = 0.15;
                    let collapseFactor = 0;

                    if (dynamicVelocity > speedThreshold) {
                        // 映射超过临界点的值，锁住安全上限因子（/ 2.5），不让速度无限狂飙
                        collapseFactor = Math.min(1, (dynamicVelocity - speedThreshold) / 2.5);
                        
                        // 关键：冲破临界后赋予精准的“首尾衔接加成”，压在安全闭合弧度以内，拉出纯净视界圆圈
                        dynamicVelocity += collapseFactor * 2.6; 
                    }

                    // 2. 半径收缩：根据成圆系数(collapseFactor)，丝滑由四周抽向内圈
                    let targetRadius = this.yOrigin * (1 - collapseFactor * 0.52);
                    
                    // 阻尼缓动，保障扩散与收缩的拉伸物理感
                    this.y = smoothLerp(this.y, targetRadius + (1 - collapseFactor) * shake, 0.15, 0.1);
                    // ======================================================================

                    this.currentRotation += dynamicVelocity * 0.5;

                    context.save();
                    
                    let alpha = (1 - ((this.orbital) / 270));
                    if (this.freqType === 'bass') alpha += audioFactors.bass * 0.2;
                    
                    // 随着粒子凝聚成圈，光带亮度自动增益充能，增强视觉厚度
                    let finalAlpha = Math.min(0.9, Math.max(0.08, alpha)) + (collapseFactor * 0.35);
                    context.fillStyle = `rgba(${this.colorStr}, ${finalAlpha})`;
                    context.strokeStyle = context.fillStyle;
                    
                    // 成圆状态下稍微加粗线段，使高发光圈更连贯
                    context.lineWidth = (this.freqType === 'bass' && collapseFactor > 0.6) ? 1.8 : 1.0; 
                    
                    const oldPos = rotate(centerx, centery, this.prevX, this.prevY, this.prevR - this.currentRotation);
                    
                    context.translate(centerx, centery);
                    context.rotate(this.currentRotation);
                    context.translate(-centerx, -centery);
                    
                    context.beginPath();
                    context.moveTo(oldPos[0], oldPos[1]);
                    context.lineTo(this.x, this.y);
                    context.stroke();
                    context.restore();

                    this.prevR = this.currentRotation;
                    this.prevX = this.x;
                    this.prevY = this.y;
                }
            }

            window.addEventListener('resize', () => {
                cw = window.innerWidth;
                ch = window.innerHeight;
                canvas.width = cw * dpr;
                canvas.height = ch * dpr;
                centerx = cw / 2;
                centery = ch / 2;
                context.scale(dpr, dpr);
                stars.forEach(star => {
                    star.x = centerx;
                    star.yOrigin = centery + star.orbital;
                });
            });

            const centerHover = document.querySelector('.centerHover');
            centerHover.addEventListener('click', function(e) {
                initAudioContext();
                this.classList.add('open');
                playTrack();
            });

            function loop() {
                updateAnalyserData();

                // 保持 0.16 细腻尾迹
                context.fillStyle = 'rgba(6,6,8,0.16)'; 
                context.fillRect(0, 0, cw, ch);

                for (let i = 0; i < stars.length; i++) { 
                    if (stars[i] !== undefined) stars[i].draw(); 
                }
                requestAnimationFrame(loop);
            }

            function init() {
                context.fillStyle = 'rgba(6,6,8,1)'; 
                context.fillRect(0, 0, cw, ch);
                for (let i = 0; i < 2200; i++) new Star();
                loop();
            }
            init();
        }

        // ==================== 控制台与原生控制交互层 ====================
        const btnPlay = document.getElementById('btnPlay');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const btnShuffle = document.getElementById('btnShuffle');
        const btnLoop = document.getElementById('btnLoop');
        const trackInfo = document.getElementById('trackInfo');

        function updateUI() {
            trackInfo.textContent = playlist[currentTrackIndex];
            if (audio.paused) {
                btnPlay.classList.remove('playing');
            } else {
                btnPlay.classList.add('playing');
            }
            if (isShuffle) btnShuffle.classList.add('active');
            else btnShuffle.classList.remove('active');
            if (isLoop) btnLoop.classList.add('active');
            else btnLoop.classList.remove('active');
        }

        function playTrack() {
            initAudioContext(); 
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            audio.play().then(() => {
                updateUI();
            }).catch(err => {
                console.log("音频管线等待交互: ", err);
            });
        }

        function togglePlay(e) {
            e.stopPropagation(); 
            if (audio.paused) {
                playTrack();
            } else {
                audio.pause();
                updateUI();
            }
        }

        function nextTrack(e) {
            if (e && e.stopPropagation) e.stopPropagation();
            if (isLoop) {
                audio.currentTime = 0;
            } else if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentTrackIndex = (currentTrackIndex + 1) % playlist.length;
            }
            audio.src = playlist[currentTrackIndex];
            playTrack();
        }

        function prevTrack(e) {
            if (e && e.stopPropagation) e.stopPropagation();
            if (isShuffle) {
                currentTrackIndex = Math.floor(Math.random() * playlist.length);
            } else {
                currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length;
            }
            audio.src = playlist[currentTrackIndex];
            playTrack();
        }

        btnPlay.addEventListener('click', togglePlay);
        btnNext.addEventListener('click', nextTrack);
        btnPrev.addEventListener('click', prevTrack);

        btnShuffle.addEventListener('click', (e) => {
            e.stopPropagation();
            isShuffle = !isShuffle;
            if (isShuffle) isLoop = false; 
            updateUI();
        });

        btnLoop.addEventListener('click', (e) => {
            e.stopPropagation();
            isLoop = !isLoop;
            if (isLoop) isShuffle = false;
            updateUI();
        });

        audio.addEventListener('ended', () => {
            if (isLoop) {
                audio.currentTime = 0;
                playTrack();
            } else {
                nextTrack();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            blackhole('#blackhole');
            updateUI();
        });
    </script>
</body>
</html>
