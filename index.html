<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA 配置支持 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="./manifest.json">
    <title>流体艺术播放舱·完全体</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none; -webkit-user-select: none;
        }
        html, body {
            width: 100vw; height: 100vh; overflow: hidden;
            background-color: #000000;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro SC", sans-serif;
            color: #fff;
        }

        /* ==========================================================================
           【性能重构】双图层静态硬件加速背景矩阵（拒绝动态Blur引起的重绘暴风雨）
           ========================================================================== */
        .bg-layer-wrapper {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1;
            overflow: hidden; background: #000;
        }
        .bg-img-clear {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
            -webkit-mask-image: 
                radial-gradient(circle at 50% 45%, rgba(0,0,0,1) 45%, rgba(0,0,0,0.7) 75%, rgba(0,0,0,0) 98%),
                linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 25%, rgba(0,0,0,1) 55%);
            -webkit-mask-composite: destination-in; mask-composite: intersect;
            filter: brightness(0.9) saturate(1.1);
            will-change: opacity; transform: translateZ(0);
        }
        .bg-img-blur {
            position: absolute; width: 110%; height: 110%; top: -5%; left: -5%; object-fit: cover;
            filter: blur(30px) brightness(0.6);
            opacity: 0; will-change: opacity; transform: translateZ(0);
        }

        /* ==========================================================================
           【底层重构】 脱离文档流隔离主舱（避免缩放引发全局重排）
           ========================================================================== */
        .main-player-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10;
            background: transparent;
            padding: calc(16px + env(safe-area-inset-top, 44px)) 36px calc(24px + env(safe-area-inset-bottom, 34px)) 36px;
            display: flex; flex-direction: column;
            transform-origin: center 40%;
            will-change: transform, opacity;
            transform: translateZ(0);
        }

        .lyrics-viewport { flex: 1; display: flex; justify-content: center; align-items: center; text-align: center; }
        .lyric-main { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.95); line-height: 1.6; text-shadow: 0 4px 16px rgba(0,0,0,0.7); }

        .meta-data { 
            margin-top: 10px; text-align: center; height: 30px; overflow: hidden; position: relative;
            -webkit-mask-image: linear-gradient(to right, transparent, #fff 15%, #fff 85%, transparent);
            mask-image: linear-gradient(to right, transparent, #fff 15%, #fff 85%, transparent);
        }
        .song-title-wrapper {
            display: inline-block; white-space: nowrap; position: absolute; left: 50%; top: 0;
            transform: translateX(-50%); will-change: transform;
        }
        .song-title {
            display: inline-block; font-size: 17px; font-weight: 600; color: rgba(255, 255, 255, 0.9); 
            letter-spacing: 1px; padding: 0 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        @keyframes marquee-anim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .timeline-box { margin-top: 36px; width: 100%; padding: 24px 0; cursor: pointer; touch-action: none; position: relative; z-index: 15; } 
        .rail-line { width: 100%; height: 3px; background: rgba(255, 255, 255, 0.25); position: relative; border-radius: 1.5px; pointer-events: none; }
        .fill-line { width: 0%; height: 100%; background: #ffffff; border-radius: 1.5px; will-change: width; position: relative; }
        .fill-line::after {
            content: ''; position: absolute; right: -6px; top: -4.5px; width: 12px; height: 12px;
            background: #fff; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            opacity: 0; transition: opacity 0.2s;
        }
        .timeline-box:active .fill-line::after { opacity: 1; } 

        .control-panel { display: flex; justify-content: center; align-items: center; gap: 60px; margin-top: 24px; margin-bottom: 8px; z-index: 15; }
        .btn { background: none; border: none; color: rgba(255, 255, 255, 0.8); display: flex; align-items: center; justify-content: center; outline: none; cursor: pointer; }
        .btn:active { opacity: 0.5; }
        .btn-play { width: 66px; height: 66px; border-radius: 50%; color: #fff; background: rgba(255, 255, 255, 0.16); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.25); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }

        /* ==========================================================================
           【顶层重构】 工业级抽屉（针对宿主WebView视口溢出保护）
           ========================================================================== */
        .drawer-overlay-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100;
            background: rgba(14, 16, 20, 0.88);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-radius: 32px 32px 0 0;
            box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.65);
            padding: 20px 32px calc(16px + env(safe-area-inset-bottom, 34px)) 32px;
            display: flex; flex-direction: column;
            will-change: transform;
            transform: translateY(100vh) translateZ(0);
            overscroll-behavior: contain; 
        }

        .grabber-bar { width: 40px; height: 5px; background: rgba(255, 255, 255, 0.25); border-radius: 3px; margin: 0 auto 16px auto; flex-shrink: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.08); flex-shrink: 0; }
        .drawer-header h2 { font-size: 11px; font-weight: 600; color: rgba(255, 255, 255, 0.4); letter-spacing: 2px; }

        .scrollable-list {
            flex: 1; overflow-y: auto; position: relative;
            overscroll-behavior: contain; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; touch-action: pan-y;
        }
        .scrollable-list::-webkit-scrollbar { display: none; }
        
        .v-scroll-phantom { position: absolute; left: 0; top: 0; right: 0; z-index: -1; }
        .v-scroll-content { position: absolute; left: 0; top: 0; right: 0; width: 100%; }

        .track-item { 
            position: absolute; left: 0; width: 100%; display: flex; align-items: center;
            font-size: 15px; color: rgba(255, 255, 255, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.03); 
            cursor: pointer; will-change: transform;
        }
        .track-item-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .track-item.active { color: #ffffff; font-weight: 600; }
        
        .upload-btn { margin-top: 16px; padding: 16px; text-align: center; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; font-size: 13px; color: rgba(255, 255, 255, 0.7); cursor: pointer; flex-shrink: 0; }
        .upload-btn:active { background: rgba(255, 255, 255, 0.12); }
        #hiddenFileSelector { display: none; }
    </style>
</head>
<body>

    <input type="file" id="hiddenFileSelector" accept="audio/*" multiple>
    <audio id="audioEngine" preload="auto"></audio>
    
    <div class="bg-layer-wrapper">
        <img src="./1.jpg" class="bg-img-clear" id="bgClear" alt="背景">
        <img src="./1.jpg" class="bg-img-blur" id="bgBlur" alt="背景模糊">
    </div>

    <!-- 主播放视窗 -->
    <div class="main-player-layer" id="playerLayer">
        <div class="lyrics-viewport">
            <div class="lyric-main" id="lyricMain">轻扫或点击歌名<br>唤醒桌面PWA核舱</div>
        </div>
        <div class="meta-data">
            <div class="song-title-wrapper" id="titleWrapper">
                <div class="song-title" id="songTitle">SOUNDSCAPE</div>
            </div>
        </div>
        <div class="timeline-box" id="progressBar">
            <div class="rail-line"><div class="fill-line" id="progressFill"></div></div>
        </div>
        <div class="control-panel" id="controlPanel">
            <button class="btn" id="prevBtn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
            <button class="btn btn-play" id="playBtn"><svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24" id="playIcon"><path d="M8 5v14l11-7z"/></svg></button>
            <button class="btn" id="nextBtn"><svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"/></svg></button>
        </div>
    </div>

    <!-- 顶层列表舱 -->
    <div class="drawer-overlay-layer" id="drawerLayer">
        <div class="grabber-bar"></div>
        <div class="drawer-header"><h2>PLAYBACK QUEUE (<span id="queueCount">0</span>)</h2></div>
        
        <!-- 虚拟滚动容器池 -->
        <div class="scrollable-list" id="listContainer">
            <div class="v-scroll-phantom" id="vPhantom"></div>
            <div class="v-scroll-content" id="vContent"></div>
        </div>
        
        <div class="upload-btn" id="uploadBtn">载入本地歌曲库</div>
    </div>

    <script>
        const playerLayer = document.getElementById('playerLayer');
        const drawerLayer = document.getElementById('drawerLayer');
        const listContainer = document.getElementById('listContainer');
        const vPhantom = document.getElementById('vPhantom');
        const vContent = document.getElementById('vContent');
        const titleWrapper = document.getElementById('titleWrapper');
        const songTitle = document.getElementById('songTitle');
        const fileSelector = document.getElementById('hiddenFileSelector');
        const audioEngine = document.getElementById('audioEngine');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');
        const playBtn = document.getElementById('playBtn');
        const bgClear = document.getElementById('bgClear');
        const bgBlur = document.getElementById('bgBlur');

        // 状态机
        let localPlaylist = []; 
        let currentIndex = 0;
        let isPlaying = false;
        let isTimelineDragging = false; 
        let playPromise = null; 
        let db = null; 

        // 动态自适应屏幕高度矩阵
        let SCREEN_HEIGHT = window.innerHeight;
        window.addEventListener('resize', () => {
            SCREEN_HEIGHT = window.innerHeight;
            if (!isOpened && !isDragging) {
                drawerLayer.style.transform = `translateY(${SCREEN_HEIGHT}px)`;
            }
        });

        const OPEN_Y = 0;
        let currentY = SCREEN_HEIGHT;
        let isOpened = false;

        let startY = 0, lastY = 0, startTime = 0, isDragging = false;
        let currentBlobUrl = null; 

        const ITEM_HEIGHT = 56; 
        let visibleCount = Math.ceil(SCREEN_HEIGHT / ITEM_HEIGHT) + 4; 

        // 初始化底卡绝对位置
        drawerLayer.style.transform = `translateY(${SCREEN_HEIGHT}px)`;

        // ==========================================================================
        // 【升级版：多媒体中心高级同步引擎】深度解决锁屏断歌与通知栏状态不同步
        // ==========================================================================
        function updateSystemMediaSession(title) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title,
                    artist: '流体音频舱',
                    album: 'PWA免打包独立版',
                    artwork: [{ src: './1.jpg', sizes: '512x512', type: 'image/jpeg' }]
                });
                
                // 强制回传状态给系统内核，阻断省电休眠机制对网页音频的切割
                navigator.mediaSession.playbackState = isPlaying ? "playing" : "paused";

                navigator.mediaSession.setActionHandler('play', () => handlePlayLogic());
                navigator.mediaSession.setActionHandler('pause', () => handlePauseLogic());
                navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
                navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
                
                // 支持系统通知栏进度条自由拖拽
                navigator.mediaSession.setActionHandler('seekto', (details) => {
                    if (audioEngine.duration && !isNaN(audioEngine.duration)) {
                        audioEngine.currentTime = details.seekTime;
                    }
                });
            }
        }

        // ==========================================================================
        // 【高效虚拟滚动内核】
        // ==========================================================================
        function initVirtualList() {
            const containerHeight = listContainer.clientHeight || (SCREEN_HEIGHT * 0.6);
            visibleCount = Math.ceil(containerHeight / ITEM_HEIGHT) + 4;
            vPhantom.style.height = localPlaylist.length * ITEM_HEIGHT + 'px';
            document.getElementById('queueCount').innerText = localPlaylist.length;
            renderVirtualItems();
        }

        function renderVirtualItems() {
            const scrollTop = listContainer.scrollTop;
            let startIndex = Math.floor(scrollTop / ITEM_HEIGHT) - 2;
            startIndex = Math.max(0, startIndex);
            
            let endIndex = startIndex + visibleCount;
            endIndex = Math.min(localPlaylist.length - 1, endIndex);

            vContent.style.transform = `translateY(${startIndex * ITEM_HEIGHT}px)`;
            vContent.innerHTML = '';

            for (let i = startIndex; i <= endIndex; i++) {
                const file = localPlaylist[i];
                const item = document.createElement('div');
                item.className = `track-item ${i === currentIndex ? 'active' : ''}`;
                item.style.height = ITEM_HEIGHT + 'px';
                item.style.top = `${(i - startIndex) * ITEM_HEIGHT}px`;

                const textSpan = document.createElement('span');
                textSpan.className = 'track-item-text';
                textSpan.innerText = `${String(i + 1).padStart(2, '0')}. ${file.name.replace(/\.[^/.]+$/, "").toUpperCase()}`;
                
                item.appendChild(textSpan);

                item.addEventListener('click', (ev) => {
                    ev.stopPropagation();
                    isPlaying = true;
                    updatePlayIcon();
                    playTrack(i);
                    animateTo(SCREEN_HEIGHT, 0.42);
                });

                vContent.appendChild(item);
            }
        }
        listContainer.addEventListener('scroll', renderVirtualItems);

        // ==========================================================================
        // 【物理流体动力学手势隔离系统】
        // ==========================================================================
        function updateParallax(y) {
            let movedRatio = (SCREEN_HEIGHT - y) / SCREEN_HEIGHT;
            movedRatio = Math.max(0, Math.min(1, movedRatio));
            
            bgClear.style.opacity = 1 - movedRatio;
            bgBlur.style.opacity = movedRatio;

            const scale = 1 - (movedRatio * 0.04);
            const opacity = 1 - (movedRatio * 0.7);
            playerLayer.style.transform = `scale(${scale}) translateZ(0)`;
            playerLayer.style.opacity = opacity;
        }

        function setAnimateStyle(duration, isSpring = false) {
            const timing = isSpring ? 'cubic-bezier(0.175, 0.885, 0.32, 1.1)' : 'cubic-bezier(0.16, 1, 0.3, 1)';
            drawerLayer.style.transform = `translateY(${currentY}px)`; 
            drawerLayer.style.transition = `transform ${duration}s ${timing}`;
            playerLayer.style.transition = `transform ${duration}s ${timing}, opacity ${duration}s ${timing}`;
            bgClear.style.transition = `opacity ${duration}s ${timing}`;
            bgBlur.style.transition = `opacity ${duration}s ${timing}`;
        }

        function removeAnimateStyle() {
            drawerLayer.style.transition = 'none';
            playerLayer.style.transition = 'none';
            bgClear.style.transition = 'none';
            bgBlur.style.transition = 'none';
        }

        function animateTo(targetY, duration = 0.45, isSpring = false) {
            currentY = targetY;
            isOpened = (currentY === OPEN_Y);
            setAnimateStyle(duration, isSpring);
            drawerLayer.style.transform = `translateY(${targetY}px)`;
            updateParallax(targetY);
            
            if(isOpened) {
                songTitle.style.animationPlayState = 'paused';
            } else {
                songTitle.style.animationPlayState = 'running';
            }
        }

        window.addEventListener('touchstart', (e) => {
            if (e.target.closest('#progressBar') || e.target.closest('#controlPanel') || e.target.closest('#uploadBtn')) return;
            
            const startX = e.touches[0].clientX;
            if (startX < 24 || startX > window.innerWidth - 24) return; 

            const touchInList = e.target.closest('.scrollable-list');
            if (isOpened && touchInList && listContainer.scrollTop > 0) return; 

            startY = e.touches[0].clientY;
            lastY = startY;
            startTime = Date.now();
            isDragging = true;
            removeAnimateStyle();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const clientY = e.touches[0].clientY;
            let deltaY = clientY - lastY;
            
            const touchInList = e.target.closest('.scrollable-list');
            if (touchInList && listContainer.scrollTop <= 0 && deltaY < 0 && isOpened) {
                isDragging = false;
                return;
            }

            lastY = clientY;
            let nextY = currentY + deltaY;
            
            if (nextY < OPEN_Y) {
                nextY = OPEN_Y - Math.log(1 + (OPEN_Y - nextY)) * 4;
            } else if (nextY > SCREEN_HEIGHT) {
                nextY = SCREEN_HEIGHT + Math.log(1 + (nextY - SCREEN_HEIGHT)) * 7;
            }

            if (e.cancelable) e.preventDefault();
            currentY = nextY;
            drawerLayer.style.transform = `translateY(${currentY}px)`;
            updateParallax(currentY);
        }, { passive: false });

        window.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            const duration = Math.max(0.01, (Date.now() - startTime) / 1000);
            const velocityY = (lastY - startY) / duration;

            if (velocityY > 350) {
                animateTo(SCREEN_HEIGHT, 0.38);
            } else if (velocityY < -350) {
                animateTo(OPEN_Y, 0.38);
            } else {
                if (currentY > SCREEN_HEIGHT * 0.4) animateTo(SCREEN_HEIGHT, 0.45, true);
                else animateTo(OPEN_Y, 0.45, true);
            }
        });

        document.getElementById('controlPanel').addEventListener('touchstart', (e) => e.stopPropagation());
        playerLayer.addEventListener('click', (e) => {
            if (isOpened && !e.target.closest('#controlPanel') && !e.target.closest('#progressBar')) {
                animateTo(SCREEN_HEIGHT, 0.42, true);
            }
        });
        titleWrapper.addEventListener('click', (e) => { e.stopPropagation(); animateTo(OPEN_Y, 0.45); });

        // ==========================================================================
        // 【智能等速无缝跑马灯引擎】
        // ==========================================================================
        function adjustSongTitleMarquee(name) {
            songTitle.style.animation = "none";
            titleWrapper.style.left = "50%";
            titleWrapper.style.transform = "translateX(-50%)";
            songTitle.innerText = name;

            const containerWidth = document.querySelector('.meta-data').clientWidth;
            const textWidth = songTitle.scrollWidth;

            if (textWidth > containerWidth - 30) {
                songTitle.innerHTML = `${name} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ${name} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;`;
                titleWrapper.style.left = "0";
                titleWrapper.style.transform = "translateX(0)";
                const duration = songTitle.scrollWidth / 32; 
                songTitle.style.animation = `marquee-anim ${duration}s linear infinite`;
                if(isOpened) songTitle.style.animationPlayState = 'paused';
            }
        }

        // ==========================================================================
        // 【工业级音频控制内核】
        // ==========================================================================
        document.getElementById('uploadBtn').addEventListener('click', (e) => { e.stopPropagation(); fileSelector.click(); });
        fileSelector.addEventListener('change', (e) => {
            let files = Array.from(e.target.files);
            if (files.length === 0) return;
            
            localPlaylist = files.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN', { numeric: true }));
            
            currentIndex = 0;
            initVirtualList();
            isPlaying = true;
            updatePlayIcon();
            playTrack(0);
        });

        function playTrack(index) {
            if (localPlaylist.length === 0) return;
            currentIndex = index;

            if (currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
            currentBlobUrl = URL.createObjectURL(localPlaylist[index]);
            
            smoothSwitchSrc(currentBlobUrl);

            const cleanedName = localPlaylist[index].name.replace(/\.[^/.]+$/, "").toUpperCase();
            document.getElementById('lyricMain').innerText = cleanedName; 
            adjustSongTitleMarquee(cleanedName);
            updateSystemMediaSession(cleanedName);
            
            renderVirtualItems(); 
        }

        function smoothSwitchSrc(newSrc) {
            audioEngine.pause(); 
            if (!audioEngine.src) {
                audioEngine.src = newSrc;
                safeAudioPlay();
                return;
            }
            let vol = 1;
            const fadeOut = setInterval(() => {
                vol -= 0.25;
                if (vol <= 0) {
                    clearInterval(fadeOut);
                    audioEngine.volume = 0;
                    audioEngine.removeAttribute('src');
                    audioEngine.load(); 
                    audioEngine.volume = 1;
                    audioEngine.src = newSrc;
                    safeAudioPlay();
                } else {
                    audioEngine.volume = vol;
                }
            }, 16);
        }

        function safeAudioPlay() {
            if (audioEngine.src && isPlaying) {
                playPromise = audioEngine.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        if ('mediaSession' in navigator) {
                            navigator.mediaSession.playbackState = "playing";
                        }
                    }).catch(error => {
                        if (error.name !== "AbortError") {
                            isPlaying = false;
                            updatePlayIcon();
                        }
                    });
                }
            }
        }

        function handlePlayLogic() {
            if (localPlaylist.length === 0) { animateTo(OPEN_Y, 0.45); return; }
            isPlaying = true; 
            updatePlayIcon(); 
            safeAudioPlay();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
        }
        
        function handlePauseLogic() {
            isPlaying = false; 
            updatePlayIcon(); 
            audioEngine.pause();
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        }

        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if(isPlaying) handlePauseLogic(); else handlePlayLogic();
        });

        function updatePlayIcon() {
            const playIcon = document.getElementById('playIcon');
            playIcon.innerHTML = isPlaying ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
        }

        audioEngine.addEventListener('timeupdate', () => {
            if (audioEngine.duration && !isNaN(audioEngine.duration) && !isTimelineDragging) {
                progressFill.style.width = (audioEngine.currentTime / audioEngine.duration) * 100 + '%';
            }
        });

        function handleTimelinePan(e) {
            if (!audioEngine.duration || isNaN(audioEngine.duration)) return;
            isTimelineDragging = true;
            const rect = progressBar.getBoundingClientRect();
            const touchX = e.touches ? e.touches[0].clientX : e.clientX;
            let ratio = (touchX - rect.left) / rect.width;
            ratio = Math.max(0, Math.min(1, ratio));
            progressFill.style.width = ratio * 100 + '%';
            return ratio;
        }

        progressBar.addEventListener('touchstart', (e) => { e.stopPropagation(); handleTimelinePan(e); });
        progressBar.addEventListener('touchmove', (e) => { if(e.cancelable) e.preventDefault(); handleTimelinePan(e); });
        progressBar.addEventListener('touchend', (e) => {
            if (isTimelineDragging) {
                const rect = progressBar.getBoundingClientRect();
                let ratio = (e.changedTouches[0].clientX - rect.left) / rect.width;
                ratio = Math.max(0, Math.min(1, ratio));
                audioEngine.currentTime = ratio * audioEngine.duration;
                isTimelineDragging = false;
            }
        });
        progressBar.addEventListener('click', (e) => {
            if (!audioEngine.duration || isNaN(audioEngine.duration)) return;
            const rect = progressBar.getBoundingClientRect();
            audioEngine.currentTime = ((e.clientX - rect.left) / rect.width) * audioEngine.duration;
        });

        function playNext() { if(localPlaylist.length) playTrack((currentIndex + 1) % localPlaylist.length); }
        function playPrev() { if(localPlaylist.length) playTrack((currentIndex - 1 + localPlaylist.length) % localPlaylist.length); }

        document.getElementById('nextBtn').addEventListener('click', (e) => { e.stopPropagation(); playNext(); });
        document.getElementById('prevBtn').addEventListener('click', (e) => { e.stopPropagation(); playPrev(); });
        audioEngine.addEventListener('ended', playNext);

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                songTitle.style.animationPlayState = 'paused';
            } else {
                if(!isOpened) songTitle.style.animationPlayState = 'running';
            }
        });

        document.addEventListener("backbutton", (e) => {
            if (isOpened) {
                e.preventDefault();
                animateTo(SCREEN_HEIGHT, 0.42, true);
            }
        }, false);

        // IndexedDB 状态现场重建
        const DB_NAME = "LocalPlayerCacheDB";
        const requestDB = indexedDB.open(DB_NAME, 1);
        requestDB.onupgradeneeded = (e) => {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("player_state")) database.createObjectStore("player_state", { keyPath: "id" });
        };
        requestDB.onsuccess = (e) => {
            db = e.target.result;
            const store = db.transaction(["player_state"], "readonly").objectStore("player_state").get("current_session");
            store.onsuccess = () => {
                if (store.result) {
                    currentIndex = store.result.currentIndex || 0;
                    document.getElementById('lyricMain').innerHTML = "历史舱体已挂载<br>点击下方重新引入歌曲目录";
                }
            };
        };
        setInterval(() => {
            if (db && localPlaylist.length > 0 && audioEngine.duration) {
                db.transaction(["player_state"], "readwrite").objectStore("player_state").put({
                    id: "current_session", currentIndex: currentIndex, currentTime: audioEngine.currentTime
                });
            }
        }, 5000);

        // ==========================================================================
        // 【PWA 核心线程自动注册】
        // ==========================================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA 核舱常驻成功', reg.scope))
                    .catch(err => console.log('核舱注册失败', err));
            });
        }
    </script>
</body>
</html>
