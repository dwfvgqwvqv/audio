<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 星空穿梭音频控制</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/thegoodmonolith">
  <style>
    @font-face {
      font-family: "PP Neue Montreal";
      src: url("https://fonts.cdnfonts.com/s/64587/PPNeueMontreal-Medium.woff2") format("woff2");
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --color-bg: #111111;
      --color-text: #ffffff;
      --font-title: "PP Neue Montreal", sans-serif;
      --font-size-h1: 3rem;
      --letter-spacing-title: -0.03em;
    }

    *, *:before, *:after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: pointer;
    }

    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("https://img.freepik.com/premium-photo/white-dust-scratches-black-background_279525-2.jpg?w=640");
      background-repeat: repeat;
      opacity: 0.05;
      mix-blend-mode: screen;
      pointer-events: none;
      z-index: 1;
    }

    .webgl-section {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      overflow: hidden;
    }

    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas#space {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .click-to-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--color-text);
      font-family: var(--font-title);
      font-size: 1rem;
      letter-spacing: 0.1em;
      z-index: 30;
      pointer-events: none;
      text-transform: uppercase;
      opacity: 0.8;
      transition: opacity 0.5s ease;
    }

    .click-to-play.hidden {
      opacity: 0;
    }
  </style>
</head>
<body>

  <div class="click-to-play" id="clickHint">Click anywhere to play 1.mp3</div>

  <div class="webgl-section" id="webglSection">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="space"></canvas>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("space");
    const ctx = canvas.getContext("2d");
    const clickHint = document.getElementById("clickHint");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const numStars = 1900;
    const focalLength = canvas.width * 2;
    let centerX = canvas.width / 2;
    let centerY = canvas.height / 2;
    const baseTrailLength = 2;
    const maxTrailLength = 30;

    let stars = [];
    let warpSpeed = 0;

    let audioCtx;
    let analyser;
    let dataArray;
    let audioStarted = false;

    function initializeStars() {
      stars = [];
      for (let i = 0; i < numStars; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          z: Math.random() * canvas.width,
          o: 0.5 + Math.random() * 0.5,
          trail: []
        });
      }
    }

    function initAudio() {
      if (audioStarted) return;
      audioStarted = true;
      clickHint.classList.add("hidden");

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 256;

      const audio = new Audio();
      audio.src = "1.mp3";
      audio.crossOrigin = "anonymous";
      audio.loop = true;

      const source = audioCtx.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioCtx.destination);

      const bufferLength = analyser.frequencyBinCount;
      dataArray = new Uint8Array(bufferLength);

      audio.play();
    }

    function moveStars() {
      for (let i = 0; i < stars.length; i++) {
        const star = stars[i];
        const speed = 1 + warpSpeed * 50;
        star.z -= speed;
        if (star.z < 1) {
          star.z = canvas.width;
          star.x = Math.random() * canvas.width;
          star.y = Math.random() * canvas.height;
          star.trail = [];
        }
      }
    }

    function drawStars() {
      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        centerX = canvas.width / 2;
        centerY = canvas.height / 2;
      }

      const trailLength = Math.floor(baseTrailLength + warpSpeed * (maxTrailLength - baseTrailLength));
      const clearAlpha = 1 - warpSpeed * 0.8;
      ctx.fillStyle = `rgba(17,17,17,${clearAlpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < stars.length; i++) {
        const star = stars[i];
        const px = (star.x - centerX) * (focalLength / star.z) + centerX;
        const py = (star.y - centerY) * (focalLength / star.z) + centerY;

        star.trail.push({ x: px, y: py });
        if (star.trail.length > trailLength) {
          star.trail.shift();
        }

        if (star.trail.length > 1) {
          ctx.beginPath();
          ctx.moveTo(star.trail[0].x, star.trail[0].y);
          for (let j = 1; j < star.trail.length; j++) {
            ctx.lineTo(star.trail[j].x, star.trail[j].y);
          }
          ctx.strokeStyle = `rgba(209,255,255,${star.o})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        ctx.fillStyle = `rgba(209,255,255,${star.o})`;
        ctx.fillRect(px, py, 1, 1);
      }
    }

    function updateAudioWarp() {
      if (!audioStarted || !analyser) return;

      analyser.getByteFrequencyData(dataArray);

      let lowFreqSum = 0;
      const energyBins = Math.floor(dataArray.length * 0.3); 
      for (let i = 0; i < energyBins; i++) {
        lowFreqSum += dataArray[i];
      }
      const averageVolume = lowFreqSum / energyBins;

      const targetWarpSpeed = Math.min(averageVolume / 180, 1);
      
      warpSpeed += (targetWarpSpeed - warpSpeed) * 0.15;
    }

    function animate() {
      requestAnimationFrame(animate);
      updateAudioWarp();
      moveStars();
      drawStars();
    }

    initializeStars();
    animate();

    window.addEventListener("click", initAudio);

    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      centerX = canvas.width / 2;
      centerY = canvas.height / 2;
    });
  </script>
</body>
</html>
